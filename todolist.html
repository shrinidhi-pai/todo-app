<!doctype html>
<html lang="en">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <head>
    <meta charset="UTF-8" />
    <title>To Do List</title>

    <style>
      body {
        font-family: Arial;
        background: aliceblue;
        background-repeat: no-repeat;
        background-size: cover;
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        
        padding: 25px;
        border-radius: 12px;
        width: 400px;
        text-align: center;
        background: rgba(36, 25, 232, 0.15);
        backdrop-filter: blur(1px);
        color: black;
      }

      h1 {
        margin-bottom: 15px;
      }

      .input-box {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 10px;
      }

      button.add {
        padding: 10px;
        background: green;
        color: white;
        border: none;
        cursor: pointer;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(240, 225, 116, 0.314);
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
      }

      .icons {
        display: flex;
        gap: 10px;
      }

      .icons button {
        border: none;
        background: transparent;
        font-size: 16px;
        cursor: pointer;
      }

      .icons button:hover {
        transform: scale(1.2);
      }

      @media (max-width: 600px) {
        body {
          padding: 10px;
          height: auto;
          align-items: flex-start;
        }

        .container {
          width: 100%;
          padding: 15px;
          border-radius: 10px;
        }

        h1 {
          font-size: 20px;
        }

        .input-box {
          flex-direction: column;
          gap: 8px;
        }

        input {
          width: 100%;
          font-size: 14px;
        }

        button.add {
          width: 100%;
          font-size: 14px;
        }

        li {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }

        .icons {
          width: 100%;
          justify-content: flex-end;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>My To Do List 🚀</h1>

      <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task" />
        <button class="add" onclick="addTask()">Add</button>
      </div>

      <ul id="taskList"></ul>
    </div>

    <script>
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

      showTasks();

      function addTask() {
        let input = document.getElementById("taskInput");

        if (input.value === "") {
          alert("Enter task");
          return;
        }

        tasks.push(input.value);
        input.value = "";

        saveData();
      }

      function showTasks() {
        let list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task, i) => {
          let li = document.createElement("li");

          li.innerHTML = `
      <span>${task}</span>
      <div class="icons">
        <button onclick="editTask(${i})">✏️</button>
        <button onclick="deleteTask(${i})">🗑️</button>
      </div>
    `;

          list.appendChild(li);
        });
      }

      function editTask(i) {
        let newTask = prompt("Edit task:", tasks[i]);

        if (newTask !== null && newTask !== "") {
          tasks[i] = newTask;
          saveData();
        }
      }

      function deleteTask(i) {
        tasks.splice(i, 1);
        saveData();
      }

      function saveData() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
        showTasks();
      }
    </script>
  </body>
</html>
